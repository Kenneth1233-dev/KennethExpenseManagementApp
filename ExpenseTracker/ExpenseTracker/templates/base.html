{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=*no*">
    <meta name="description" content="" />
    <meta name="author" content="" />
    <title>Page Title - SB Admin</title>
     <link rel="stylesheet" type="text/css" href="{% static 'registration.css' %}">
     <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous"></script>
</head>
<body>
    <div class="message" id="alert message">
        {% for message in messages %}
        <div class="alert alert - {{ message.tag }} mb-0 alert-dismissible fade show" role="alert">
            <strong>Message :</strong>{{ message }}
            <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                <span aria-hidden="true">*</span>
            </button>
        </div>
        {% endfor %}
    </div>
     {% block body %}
      {% endblock body %}

</body>
</html>
